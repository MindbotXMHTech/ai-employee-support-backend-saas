          type: string
        embedding_model:
          type: string
        rag_enabled:
          type: boolean
          default: true
        mental_health_enabled:
          type: boolean
          default: true
        safety_enabled:
          type: boolean
          default: true
        handoff_enabled:
          type: boolean
          default: true
        classification_enabled:
          type: boolean
          default: true
